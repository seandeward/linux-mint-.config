[colors]
# background color for the polybar itself - set to black_blue
background = #1c2a2d
# highlights the current selected workspace - set to gray_blue
background-alt = #232f32
# main color for text - set to light-biege
foreground = #fad7a4
# used for selection bar and for some of the text - set to light_orange
primary = #bb8637
# not being used right now
secondary = #ffffff
# not sure when this will pop up, but I've set it to orange
alert = #6d3f2a
# not totally sure what this does, but set to gray_blue
disabled = #3d505a

[bar/example]
width = 100%
height = 24pt
radius = 6

; dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

border-size = 4pt
border-color = #00000000

# margin-top = 0 - this does nothing with i3
# margin-bottom = 0 - this does nothing with i3
padding-left = 1
padding-right = 1

module-margin = 1

separator = |
separator-foreground = ${colors.disabled}

font-0 = monospace;2

modules-left = xworkspaces xwindow
modules-right = filesystem pulseaudio xkeyboard memory cpu wlan eth date

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3

; override-redirect = true

[module/i3]
type = internal/i3

# create click handler used to focus workspace
# Default: True
enable-click = true

# create scroll handlers used to cycle workspaces
# Default = true
enable-scroll = true

# wrap around when reaching the first/last workspace
# default: true
wrapping-scroll = true

# set the scroll cycle direction
# default: true
reverse-scroll = False

[module/systray]
type = internal/tray

format-margin = 8pt
tray-spacing = 16pt

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.primary}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

label-mounted = %{F#F0C674}%mountpoint%%{F-} %percentage_used%%

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/pulseaudio]
type = internal/pulseaudio

# interval for volume increase/decrease (in percent points)
# default: 5
interval = 5

format-volume-prefix = "VOL "
format-volume-prefix-foreground = ${colors.primary}

# available tags:
#   <label-muted> (default)
#   <ramp-volume>
#   <bar-volume>
format-volume = <label-volume>

# Available Tags:
#   %percentage% (default)
#   %decibels%
label-volume = %percentage%%

label-muted = VOL Muted
label-muted-foreground = ${colors.disabled}

# Right and Middle click
click-right = pavucontrol
# clickmiddle =

[module/xkeyboard]
# Displays

#type = internal/xkeyboard
#blacklist-0 = num lock

#label-layout = %layout%
#label-layout-foreground = ${colors.primary}

#label-indicator-padding = 2
#label-indicator-margin = 1
#label-indicator-foreground = ${colors.background}
#label-indicator-background = ${colors.secondary}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "RAM "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#F0C674}%ifname%%{F#707880} disconnected

[module/wlan]
inherit = network-base
interface-type = wireless
label-connected = %{F#F0C674}%ifname%%{F-} %essid% %local_ip%

[module/eth]
inherit = network-base
interface-type = wired
label-connected = %{F#F0C674}%ifname%%{F-} %local_ip%

[module/date]
type = internal/date
interval = 1

date = %H:%M
date-alt = %Y-%m-%d %H:%M:%S

label = %date%
label-foreground = ${colors.primary}

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
